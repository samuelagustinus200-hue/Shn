<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamera AI Blur 📸</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(135deg, #1e1e24, #15151a, #0a0a0c);
            font-family: 'Poppins', sans-serif; color: white; padding: 15px;
            overflow-x: hidden;
        }
        h2 { margin-top: 0; margin-bottom: 15px; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.8); text-align: center; font-size: 24px; }
        
        /* Layout Kamera Dinormalkan biar gak nge-zoom */
        .container {
            position: relative; width: 100%; max-width: 400px;
            height: 60vh; /* Tinggi fleksibel mengikuti layar HP */
            border-radius: 20px; overflow: hidden;
            background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .video-wrapper {
            width: 100%; height: 100%; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        video {
            width: 100%; height: 100%; 
            object-fit: cover; /* Menutupi area tanpa merusak proporsi berlebihan */
            transform: scaleX(-1);
            transition: filter 0.3s ease-in-out, transform 0.1s ease-out; display: block;
        }
        .blur-effect { filter: blur(20px) brightness(0.85); }

        /* Layar Loading (Akan hilang otomatis saat kamera siap) */
        #loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 30; transition: opacity 0.4s ease; padding: 20px; text-align: center;
        }

        .spinner { width: 35px; height: 35px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #1abc9c; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #status-badge { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; z-index: 10; opacity: 0; border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s;}

        /* Kontrol UI */
        .zoom-control { margin-top: 15px; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; }
        .zoom-slider-container { display: flex; align-items: center; gap: 10px; width: 100%; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        input[type="range"] { flex: 1; accent-color: #1abc9c; height: 4px; border-radius: 2px; }
        #zoom-val { font-size: 13px; font-weight: 700; min-width: 40px; text-align: right; color: #1abc9c; }

        .btn-group { display: flex; gap: 12px; margin-top: 15px; justify-content: center; width: 100%; max-width: 400px; }
        button { border: none; padding: 12px; font-size: 14px; font-family: 'Poppins', sans-serif; font-weight: 600; border-radius: 15px; cursor: pointer; transition: all 0.2s; color: white; display: flex; align-items: center; justify-content: center; flex: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555; box-shadow: none; opacity: 0.6; cursor: not-allowed; transform: none; }
        
        #capture-btn { background: linear-gradient(45deg, #2980b9, #3498db); }
        #record-btn { background: linear-gradient(45deg, #d35400, #e67e22); }
        .recording { background: linear-gradient(45deg, #c0392b, #e74c3c) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231,76,60,0.6); } 70% { box-shadow: 0 0 0 12px rgba(231,76,60,0); } 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); } }
    </style>
</head>
<body>

    <audio id="bg-music" src="ssstik.io_1782576129802.mp3" preload="auto"></audio>

    <h2>Kamera BLUR | SHN22📸</h2>
    
    <div class="container">
        
        <div class="video-wrapper">
            <video id="input_video" autoplay playsinline muted></video>
        </div>
        
        <div id="loading-overlay">
            <div class="spinner"></div>
            <div style="font-weight: 600; font-size: 13px;" id="loading-text">Izinkan Kamera di Browser...<br><span style="font-size: 10px; font-weight: 400; color: #aaa;">Sistem sedang memuat AI</span></div>
        </div>

        <div id="status-badge">Mendeteksi...</div>
    </div>

    <div class="zoom-control">
        <div class="zoom-slider-container">
            <span style="font-size: 12px;">🔍 0.5x</span>
            <input type="range" id="zoom-slider" min="0.5" max="10" step="0.1" value="1" disabled>
            <span id="zoom-val">1.0x</span>
        </div>
    </div>

    <div class="btn-group">
        <button id="capture-btn" disabled>📸 Foto</button>
        <button id="record-btn" disabled>🎥 Rekam</button>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const statusBadge = document.getElementById('status-badge');
        const captureBtn = document.getElementById('capture-btn');
        const recordBtn = document.getElementById('record-btn');
        const zoomSlider = document.getElementById('zoom-slider');
        const zoomVal = document.getElementById('zoom-val');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audioEl = document.getElementById('bg-music');
        
        let isCurrentlyBlurred = false;
        let isAiReady = false;
        let currentZoom = 1.0;

        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        // Kontrol Zoom
        zoomSlider.addEventListener('input', (e) => {
            currentZoom = parseFloat(e.target.value);
            zoomVal.innerText = currentZoom.toFixed(1) + 'x';
            videoElement.style.transform = `scaleX(-1) scale(${currentZoom})`;
        });

        // Setup AI & Kamera (Otomatis berjalan saat web dibuka)
        function inisialisasiKameraDanAI() {
            function onResults(results) {
                if (!isAiReady) {
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => loadingOverlay.style.display = 'none', 400);
                    statusBadge.style.opacity = '1';
                    captureBtn.disabled = false;
                    recordBtn.disabled = false;
                    zoomSlider.disabled = false;
                    isAiReady = true;
                }

                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    videoElement.classList.add('blur-effect');
                    statusBadge.innerText = "🖐️ Sensor Aktif";
                    statusBadge.style.background = "rgba(46, 204, 113, 0.8)";
                    isCurrentlyBlurred = true;
                } else {
                    videoElement.classList.remove('blur-effect');
                    statusBadge.innerText = "Kamera Normal";
                    statusBadge.style.background = "rgba(0, 0, 0, 0.5)";
                    isCurrentlyBlurred = false;
                }

                // Render ke Canvas (Hidden)
                canvas.width = results.image.width || videoElement.videoWidth;
                canvas.height = results.image.height || videoElement.videoHeight;
                ctx.clearRect(0,0, canvas.width, canvas.height);
                ctx.save();
                
                if (isCurrentlyBlurred) {
                    ctx.filter = 'blur(20px) brightness(0.85)';
                } else {
                    ctx.filter = 'none';
                }

                const targetWidth = canvas.width * currentZoom;
                const targetHeight = canvas.height * currentZoom;
                const offsetX = (canvas.width - targetWidth) / 2;
                const offsetY = (canvas.height - targetHeight) / 2;

                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1); // Mirroring
                
                // Gunakan gambar dari hasil AI (jika ada) atau langsung dari video
                const imageSource = results.image || videoElement;
                ctx.drawImage(imageSource, offsetX, offsetY, targetWidth, targetHeight);
                ctx.restore();
            }

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            // AKURASI DITINGKATKAN DI SINI (modelComplexity: 1)
            hands.setOptions({ 
                maxNumHands: 1, 
                modelComplexity: 1, 
                minDetectionConfidence: 0.75, 
                minTrackingConfidence: 0.75 
            });
            
            hands.onResults(onResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => await hands.send({image: videoElement}),
                facingMode: 'user' // Membiarkan resolusi menyesuaikan kamera bawaan HP agar tidak terpotong (zoom out maksimal)
            });
            
            camera.start().catch(err => {
                loadingText.innerHTML = `<span style="color: #e74c3c; font-size: 16px;">Izin Kamera Ditolak!</span><br><span style="font-size: 12px; font-weight: normal;">Silakan refresh web ini dan pilih "Izinkan" / "Allow".</span>`;
                document.querySelector('.spinner').style.display = 'none';
            });
        }

        // Jalankan Inisialisasi secara otomatis
        window.onload = () => {
            inisialisasiKameraDanAI();
        };

        // Fitur Foto
        captureBtn.addEventListener('click', () => {
            const dataURL = canvas.toDataURL('image/jpeg', 1.0);
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'Momen_Blur_' + Date.now() + '.jpg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Fitur Rekam Video & Audio Seamless
        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                try {
                    // Mulai Musik dari Detik 0 (Diizinkan karena dipicu oleh klik tombol)
                    audioEl.currentTime = 0;
                    audioEl.play().catch(e => console.warn("Browser mencegah audio:", e));

                    const canvasStream = canvas.captureStream(30); // 30 FPS Video
                    let finalStream = canvasStream; 

                    // Coba gabungkan Audio
                    try {
                        const audioStream = audioEl.captureStream ? audioEl.captureStream() : audioEl.mozCaptureStream();
                        if (audioStream && audioStream.getAudioTracks().length > 0) {
                            finalStream = new MediaStream([
                                ...canvasStream.getVideoTracks(), 
                                ...audioStream.getAudioTracks()
                            ]);
                        }
                    } catch (e) { console.warn("Perekaman audio spesifik browser gagal, lanjut video saja.", e); }

                    // Coba format yang didukung browser
                    let mimeType = 'video/webm'; // Standar
                    if (!MediaRecorder.isTypeSupported(mimeType)) {
                        mimeType = 'video/mp4'; // Fallback iOS
                    }

                    mediaRecorder = new MediaRecorder(finalStream, { mimeType: mimeType }); 
                    
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) recordedChunks.push(e.data);
                    };
                    
                    mediaRecorder.onstop = () => {
                        // Bungkus jadi file
                        const ext = mediaRecorder.mimeType.includes('mp4') ? '.mp4' : '.webm';
                        const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                        recordedChunks = [];
                        const url = URL.createObjectURL(blob);
                        
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = 'Video_Blur_' + Date.now() + ext; 
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.innerHTML = "⏹️ Stop";
                    recordBtn.classList.add('recording');
                    captureBtn.disabled = true;
                    zoomSlider.disabled = true;

                } catch (e) {
                    alert("Gagal merekam: " + e.message);
                }
            } else {
                mediaRecorder.stop();
                audioEl.pause(); // Hentikan lagu
                isRecording = false;
                recordBtn.innerHTML = "🎥 Rekam";
                recordBtn.classList.remove('recording');
                captureBtn.disabled = false;
                zoomSlider.disabled = false;
            }
        });
    </script>
</body>
</html>
